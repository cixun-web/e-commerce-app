name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Dependencies
        run: pnpm install

      # 🔥 关键步骤：在打包前安装 Playwright 浏览器
      # 设置环境变量 PLAYWRIGHT_BROWSERS_PATH，确保浏览器下载到 resources/browsers 目录
      - name: Install Playwright Browsers
        run: npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: resources/browsers

      - name: Build & Release
        # 根据当前系统自动选择打包 win 或 mac，并发布到 GitHub Releases
        run: pnpm run build && npx electron-builder --${{ matrix.os == 'windows-latest' && 'win' || 'mac' }} -p always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
